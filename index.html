<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUANDOK NEWS</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>

<body>

<div class="app-shell">

  <header class="hero">
    <h1>SUANDOK NEWS</h1>
    <p>National Early Warning Score</p>
  </header>

  <!-- INFO -->
  <div class="card">
    <label>สถานที่ประเมิน</label>
    <input id="location" type="text" />

    <label>HN</label>
    <input id="hn" type="text" />
  </div>

  <!-- 1 -->
  <div class="card">
    <label>Respiratory Rate</label>
    <select id="respiratoryRate">
      <option value="">-- เลือก --</option>
      <option value="3">≤8 (3)</option>
      <option value="1">9–11 (1)</option>
      <option value="0">12–20 (0)</option>
      <option value="2">21–24 (2)</option>
      <option value="3">≥25 (3)</option>
    </select>
  </div>

  <!-- 2 -->
  <div class="card">
    <label>SpO₂</label>
    <select id="spo2">
      <option value="">-- เลือก --</option>
      <option value="3">≤91 (3)</option>
      <option value="2">92–93 (2)</option>
      <option value="1">94–95 (1)</option>
      <option value="0">≥96 (0)</option>
    </select>
  </div>

  <!-- 3 -->
  <div class="card">
    <label>Temperature</label>
    <select id="temperature">
      <option value="">-- เลือก --</option>
      <option value="3">≤35 (3)</option>
      <option value="1">35.1–36 (1)</option>
      <option value="0">36.1–38 (0)</option>
      <option value="1">38.1–39 (1)</option>
      <option value="2">≥39.1 (2)</option>
    </select>
  </div>

  <!-- 4 -->
  <div class="card">
    <label>Systolic BP</label>
    <select id="systolicBP">
      <option value="">-- เลือก --</option>
      <option value="3">≤90 (3)</option>
      <option value="2">91–100 (2)</option>
      <option value="1">101–110 (1)</option>
      <option value="0">111–219 (0)</option>
      <option value="3">≥220 (3)</option>
    </select>
  </div>

  <!-- 5 -->
  <div class="card">
    <label>Heart Rate</label>
    <select id="heartRate">
      <option value="">-- เลือก --</option>
      <option value="3">≤40 (3)</option>
      <option value="1">41–50 (1)</option>
      <option value="0">51–90 (0)</option>
      <option value="1">91–110 (1)</option>
      <option value="2">111–130 (2)</option>
      <option value="3">≥131 (3)</option>
    </select>
  </div>

  <!-- 6 -->
  <div class="card">
    <label>Consciousness (AVPU)</label>
    <select id="consciousness">
      <option value="">-- เลือก --</option>
      <option value="0">A (0)</option>
      <option value="3">V/P/U (3)</option>
    </select>
  </div>

  <!-- RESULT -->
  <div class="card">
    <h2>คะแนนรวม</h2>
    <div id="totalScore">0</div>

    <h3 id="urgencyLabel">Normal</h3>
    <h3 id="redFlag">ปกติ</h3>

    <button id="saveBtn">บันทึกคะแนน</button>
    <button id="resetBtn">รีเซ็ต</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
